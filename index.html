<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Think Rydell — Client preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Martel:ital,wght@0,200;0,300;0,400;0,600;0,700;1,200&display=swap" rel="stylesheet">
  <style>
    :root {
      --almost-black: #24343a;
      --cream: #f1f1f1;
      --primary: #f05151;
      --line: color-mix(in srgb, #d6cece 60%, transparent);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Martel", Georgia, serif;
      font-weight: 300;
      color: var(--almost-black);
      background: var(--cream);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: clamp(1.75rem, 5vw, 2.75rem) clamp(1.25rem, 4vw, 2rem) 3rem;
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .lede {
      margin: 0 0 2rem;
      font-size: 0.95rem;
      color: color-mix(in srgb, var(--almost-black) 78%, #d6cece);
    }
    section {
      margin-bottom: 2.25rem;
    }
    section:last-of-type {
      margin-bottom: 0;
    }
    h2 {
      margin: 0 0 1rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--primary);
    }
    .spot {
      margin-bottom: 1.5rem;
      padding: 1rem 1rem 1.1rem;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      box-shadow: 0 0.15rem 0.75rem color-mix(in srgb, var(--almost-black) 6%, transparent);
    }
    .spot:last-child {
      margin-bottom: 0;
    }
    .spot h3 {
      margin: 0 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
    }
    .spot video {
      display: block;
      width: 100%;
      border-radius: 0.35rem;
      background: var(--almost-black);
    }
    .landing-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.65rem 1.15rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: var(--primary);
      border-radius: 999px;
      box-shadow: 0 0.25rem 1rem color-mix(in srgb, var(--primary) 35%, transparent);
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .landing-link:hover {
      background: #b12726;
      box-shadow: 0 0.35rem 1.25rem color-mix(in srgb, #b12726 38%, transparent);
    }
    .landing-link:focus-visible {
      outline: 2px solid var(--almost-black);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Think Rydell</h1>
    <p class="lede">Quick preview for review: two radio spots and the landing page.</p>

    <section aria-labelledby="radio-heading">
      <h2 id="radio-heading">Radio spots</h2>
      <p style="margin: 0 0 1rem; font-size: 0.95rem;">Here are two radio ads to check out. Use the play control on each spot.</p>

      <article class="spot">
        <h3>Spot 1 — No show</h3>
        <video controls playsinline preload="metadata" src="media/radio/ad-no-show.mp4">
          Your browser does not support embedded video. <a href="media/radio/ad-no-show.mp4">Download the file</a>.
        </video>
      </article>

      <article class="spot">
        <h3>Spot 2 — Paperwork</h3>
        <video controls playsinline preload="metadata" src="media/radio/ad-paperwork.mp4">
          Your browser does not support embedded video. <a href="media/radio/ad-paperwork.mp4">Download the file</a>.
        </video>
      </article>
    </section>

    <section aria-labelledby="landing-heading">
      <h2 id="landing-heading">Landing page</h2>
      <p style="margin: 0 0 1rem; font-size: 0.95rem;">Here&rsquo;s a landing page to check out.</p>
      <a class="landing-link" href="landing.html">Open the landing page</a>
    </section>
  </main>
</body>
</html>
